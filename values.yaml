# Default values for bitcoin-shard-listener.
# Every binary flag is exposed under .config; advanced ones empty/disabled by default.

# When workloadType=Deployment, replicaCount controls replicas.
# When workloadType=DaemonSet, replicaCount is ignored (one pod per matching node).
replicaCount: 1

# Deployment | DaemonSet — DaemonSet recommended for production fabric coverage.
workloadType: Deployment

image:
  repository: ghcr.io/lightwebinc/bitcoin-shard-listener
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}

podAnnotations: {}
podLabels: {}
podSecurityContext: {}

# MLD join + NACK socket on fabric NIC require NET_ADMIN.
securityContext:
  capabilities:
    add: ["NET_ADMIN"]

networking:
  mode: multus
  multus:
    networkName: mcast-fabric
    namespace: bitcoin-mcast
    fabricIPv6: ""
    interface: net1
  host:
    dnsPolicy: ClusterFirstWithHostNet

# Full surface — every flag in bitcoin-shard-listener/config/config.go.
config:
  multicastIf: "eth0"
  listenPort: 9001
  shardBits: 2
  mcScope: "site"
  mcGroupId: "0x000B"
  shardInclude: ""
  subtreeInclude: ""
  subtreeExclude: ""

  # Downstream egress
  egressAddr: "127.0.0.1:9100"
  egressProto: "udp"
  stripHeader: false

  # Multicast egress (domain bridging)
  mcEgressEnabled: false
  mcEgressIface: ""
  mcEgressPort: 0
  mcEgressScope: ""
  mcEgressGroupId: ""
  mcEgressHopLimit: 1

  # Block header egress (BRC-131 SPV)
  headerEgressEnabled: false
  headerEgressAddr: "127.0.0.1:9101"
  headerEgressProto: "udp"
  headerMcEgressEnabled: false
  headerMcEgressIface: ""
  headerMcEgressPort: 0
  headerMcEgressScope: ""
  headerMcEgressGroupId: ""
  headerMcEgressHopLimit: 1

  # NACK / retry
  retryEndpoints: ""
  nackJitterMax: "200ms"
  nackBackoffMax: "5s"
  nackMaxRetries: 5
  nackGapTtl: "10m"

  # Beacon (BRC-126) discovery
  beaconEnabled: true
  beaconPort: 9300
  beaconScope: "site"

  # Subtree group announcements (BRC-127)
  subtreeGroups: ""
  subtreeGroupDefaultTtl: "900s"
  announceScope: "site"
  senderInclude: ""
  senderExclude: ""

  # BRC-132 subtree data
  subtreeDataEnabled: false
  subtreeDataVerifyMerkle: false

  # Egress dedup
  egressDedupCap: 0
  egressDedupTtl: "2s"
  txidDedupAddr: ""
  txidDedupPrefix: "bsl:txid:"
  txidDedupTtl: "60s"

  # Runtime
  # numWorkers is HARDCODED to 1 by the chart. Linux SO_REUSEPORT delivers
  # every multicast datagram to all sockets in the reuseport group; multiple
  # workers cause N-fold frame duplication. Do not change this.
  numWorkers: 1
  verifyPayloadHash: false
  drainTimeout: "0s"
  debug: false

  # Observability
  metricsAddr: ":9200"
  instanceId: ""
  otlpEndpoint: ""
  otlpInterval: "30s"

service:
  type: ClusterIP
  metricsPort: 9200

metrics:
  enabled: true
  path: /metrics
  port: 9200
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}
    relabelings: []
    metricRelabelings: []

probes:
  readiness:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  liveness:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3

resources: {}
nodeSelector: {}
tolerations: []
affinity: {}
priorityClassName: ""
topologySpreadConstraints: []

# DaemonSet update strategy (only when workloadType=DaemonSet).
updateStrategy: {}
# Example:
# updateStrategy:
#   type: RollingUpdate
#   rollingUpdate:
#     maxUnavailable: 1

podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: ""

networkPolicy:
  enabled: false
  ingressFrom: []

extraEnv: []
