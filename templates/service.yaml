apiVersion: v1
kind: Service
metadata:
  name: {{ include "bitcoin-shard-listener.fullname" . }}
  labels:
    {{- include "bitcoin-shard-listener.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "bitcoin-shard-listener.selectorLabels" . | nindent 4 }}
  ports:
    - name: metrics
      port: {{ .Values.service.metricsPort }}
      targetPort: metrics
      protocol: TCP
