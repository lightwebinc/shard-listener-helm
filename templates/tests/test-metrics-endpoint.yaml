apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "shard-listener.fullname" . }}-test-metrics"
  labels:
    {{- include "shard-listener.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: probe
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          wget -q -O - http://{{ include "shard-listener.fullname" . }}:{{ .Values.service.metricsPort }}/healthz \
            && wget -q -O - http://{{ include "shard-listener.fullname" . }}:{{ .Values.service.metricsPort }}{{ .Values.metrics.path }} > /dev/null
